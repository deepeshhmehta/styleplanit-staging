<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title text-config-key="SERVICES_PAGE_TITLE">Styling Services | Image Consulting & Personal Shopping Toronto</title>
    <meta name="description" property-config-key="SERVICES_PAGE_DESCRIPTION" content="Explore our curated styling services for newcomers, professionals, and executives in Toronto. From career kickstarts to bespoke image management.">
    
    <!-- Open Graph -->
    <meta property="og:title" property-config-key="SERVICES_PAGE_TITLE" content="Our Services | Style Plan(it)">

    <meta property="og:type" content="website">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div id="site-loader" class="loader-overlay">
        <div class="loader-content">
            <div class="loader-banner" text-config-key="LOADER_BANNER">Style Plan(it)</div>
            
            <div class="loader-phrase" id="loader-phrase" text-config-key="LOADER_PHRASE">Refining your style...</div>
            <div class="loader-progress-container"><div class="loader-progress-bar" id="loader-progress"></div></div>
        </div>
    </div>
    <div class="site-wrapper">
    <nav data-component="header"></nav>
    <main>
        <!-- The Menu -->
        <section id="services" class="section-padding" style="padding-top: 140px;">
            <div class="container">
                <div class="text-center">
                    <span class="section-subtitle" text-config-key="SERVICES_SUBTITLE">À La Carte</span>
                    <h2 class="section-title" text-config-key="SERVICES_TITLE">The Styling Menu</h2>
                    <p class="lead-text" style="max-width: 800px; margin: 0 auto 60px;" text-config-key="SERVICES_LEAD_TEXT">Build your own experience. Choose from our curated selection of individual services to target your specific needs.</p>
                </div>

                <div class="service-content">
                    <!-- ALL services will be dynamically inserted here in one grid -->
                </div>

                <!-- Service Details Box -->
                <div id="service-details-container" class="service-details-container" style="display: none;">
                    <!-- Active service details will be injected here -->
                </div>
            </div>
        </section>

        <!-- Social Proof -->
        <div data-component="reviews-section"></div>
    </main>    

    <footer data-component="footer"></footer>
    </div>
    <div data-component="book-now-floating"></div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@4.0.0/dist/jquery.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/features/analytics.js"></script>
    <script src="js/app.js"></script>
    <script src="js/loader.js"></script>
