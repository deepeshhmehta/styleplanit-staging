<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title text-config-key="SERVICES_PAGE_TITLE">Our Services | Style Plan(it)</title>
    <meta name="description" content="Explore our curated styling services for newcomers, professionals, and executives in Toronto. From career kickstarts to bespoke image management.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Our Services | Style Plan(it)">
    <meta property="og:description" content="Explore our curated styling services in Toronto.">
    <meta property="og:type" content="website">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">

    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/desktop.css">
    <link rel="stylesheet" href="styles/mobile.css">
</head>
<body>
    <div id="site-loader" class="loader-overlay">
        <div class="loader-content">
            <div class="loader-banner">Style Plan(it)</div>
            
            <div class="loader-phrase" id="loader-phrase">Refining your style...</div>
            <div class="loader-progress-container"><div class="loader-progress-bar" id="loader-progress"></div></div>
        </div>
    </div>
    <nav data-component="header"></nav>

    <main>
        <!-- Phase 1: The Pillars (Entry Gate) -->
        <section id="experience-intro" class="section-padding" style="padding-top: 140px;">
            <div class="container">
                <div class="text-center">
                    <span class="section-subtitle" text-config-key="EXPERIENCE_SUBTITLE">[EXPERIENCE_SUBTITLE]</span>
                    <h2 class="section-title" text-config-key="EXPERIENCE_JOURNEY_TITLE">[EXPERIENCE_JOURNEY_TITLE]</h2>
                </div>
                <div class="services-category-grid" id="services-category-selector">
                    <!-- Category cards will be dynamically inserted here -->
                </div>
            </div>
        </section>

        <!-- Phase 2: The Deep Dive -->
        <section id="services" class="section-padding">
            <div class="container">
                <div class="text-center">
                    <span class="section-subtitle" text-config-key="EXPERIENCE_MENUS_SUBTITLE">[EXPERIENCE_MENUS_SUBTITLE]</span>
                    <h2 class="section-title" id="active-category-title">The Collection</h2>
                    <button class="btn-secondary" id="btn-return-to-categories" text-config-key="EXPERIENCE_CHANGE_BTN" style="margin-bottom: 40px;">[EXPERIENCE_CHANGE_BTN]</button>
                </div>

                <div class="service-content">
                    <!-- Service cards will be dynamically inserted here -->
                </div>

                <!-- NEW: Service Details Box (Below all services) -->
                <div id="service-details-container" class="service-details-container" style="display: none;">
                    <!-- Active service details will be injected here -->
                </div>
            </div>
        </section>

        <!-- Social Proof -->
        <div data-component="reviews-section"></div>
    </main>

    <footer data-component="footer"></footer>
    <div data-component="book-now-floating"></div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@4.0.0/dist/jquery.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/loader.js"></script>
</body>
</html>
