<header class="hero-modern">
    <div class="hero-modern-inner">
        <div class="hero-bg-container">
            <div class="hero-bg active" style-bg-config-key="HERO_IMAGE_1" style="opacity: 1;"></div>
            <div class="hero-bg" style-bg-config-key="HERO_IMAGE_2"></div>
            <div class="hero-bg" style-bg-config-key="HERO_IMAGE_3"></div>
        </div>
        <div class="hero-content-float dribbble-hero-typography">
            <h1 class="dribbble-title">
                <span class="dribbble-sans block-text" style="font-size: 0.85em;" text-config-key="HERO_TITLE_LINE_1">WE ONLY BELIEVE IN ONE</span>
                <div class="dribbble-mixed-line">
                    <em class="dribbble-serif" style="text-transform: lowercase; font-size: 1.1em;" text-config-key="HERO_TITLE_LINE_2_EM">superpower,</em>
                    <span class="dribbble-sans" text-config-key="HERO_TITLE_LINE_2_SANS">STYLE</span>
                </div>
            </h1>
            
            <p class="hero-sub-mantra" text-config-key="HERO_MANTRA">WE DON'T DRESS YOU. WE DISCOVER YOU — THEN BUILD A WARDROBE THAT PROVES IT.</p>
            
            <div class="dribbble-pills" id="dynamic-hero-pills">
                <div class="floating-pill">Personal Styling</div>
                <div class="floating-pill">Strategic Branding</div>
                <div class="floating-pill">Wardrobe Curation</div>
            </div>

            <a href-config-key="HERO_BUTTON_HREF" href="#" target="_blank" rel="noopener noreferrer" class="btn dribbble-cta-btn">
                <span text-config-key="HERO_BUTTON_TEXT">DISCOVER YOURS.</span> <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </div>
</header>
