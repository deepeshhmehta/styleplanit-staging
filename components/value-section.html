<section id="why-styling" class="section-padding">
    <div class="container">
        <div class="value-split">
            <div class="value-image-box">
                <div class="value-image" style-bg-config-key="VALUE_IMAGE"></div>
                <div class="value-image-overlay"></div>
            </div>
            <div class="value-content">
                <span class="section-subtitle" text-config-key="VALUE_SUBTITLE">[VALUE_SUBTITLE]</span>
                <h2 class="section-title" text-config-key="VALUE_TITLE">[VALUE_TITLE]</h2>
                <div class="value-text-box">
                    <p class="lead-text" text-config-key="VALUE_LEAD">[VALUE_LEAD]</p>
                    <div class="value-pillars">
                        <div class="pillar">
                            <h4 text-config-key="VALUE_PILLAR_1_TITLE">[PILLAR_1]</h4>
                            <p text-config-key="VALUE_PILLAR_1_TEXT">[PILLAR_1_TEXT]</p>
                        </div>
                        <div class="pillar">
                            <h4 text-config-key="VALUE_PILLAR_2_TITLE">[PILLAR_2]</h4>
                            <p text-config-key="VALUE_PILLAR_2_TEXT">[PILLAR_2_TEXT]</p>
                        </div>
                        <div class="pillar">
                            <h4 text-config-key="VALUE_PILLAR_3_TITLE">[PILLAR_3]</h4>
                            <p text-config-key="VALUE_PILLAR_3_TEXT">[PILLAR_3_TEXT]</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="value-footer text-center">
            <a href="#packages-anchor" class="btn btn-primary-accent" text-config-key="VALUE_CTA_TEXT">Start your journey</a>
        </div>
    </div>
</section>
