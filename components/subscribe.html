<div class="container text-center">
    <div id="subscribe-container">
        <h2 class="section-title" text-config-key="SUBSCRIBE_TITLE">[SUBSCRIBE_TITLE]</h2>
        <p text-config-key="SUBSCRIBE_TEXT">[SUBSCRIBE_TEXT]</p>
        
        <div id="mc_embed_signup">
            <form action="#" 
                  method="post" 
                  id="mc-embedded-subscribe-form" 
                  name="mc-embedded-subscribe-form" 
                  class="subscribe-form validate" 
                  target="_blank"
                  rel="noopener noreferrer"
                  action-config-key="MAILCHIMP_FORM_ACTION">
                
                <input type="email" name="EMAIL" class="required email" id="mce-EMAIL" required="" 
                       placeholder-config-key="SUBSCRIBE_EMAIL_PLACEHOLDER" placeholder="[EMAIL_PLACEHOLDER]">
                
                <input type="text" name="FNAME" class="required text" id="mce-FNAME" required="" 
                       placeholder-config-key="MAILCHIMP_FNAME_PLACEHOLDER" placeholder="[FIRSTNAME_PLACEHOLDER]">

                <input type="text" name="LNAME" class="text" id="mce-LNAME" 
                       placeholder-config-key="MAILCHIMP_LNAME_PLACEHOLDER" placeholder="[LASTNAME_PLACEHOLDER]">

                <input type="text" name="PHONE" class="text" id="mce-PHONE" 
                       placeholder-config-key="MAILCHIMP_PHONE_PLACEHOLDER" placeholder="[PHONE_PLACEHOLDER]">

                <div class="birthday-row">
                    <select id="birthday-month" class="text">
                        <option value="" disabled selected>Birth Month</option>
                        <option value="01">January</option><option value="02">February</option>
                        <option value="03">March</option><option value="04">April</option>
                        <option value="05">May</option><option value="06">June</option>
                        <option value="07">July</option><option value="08">August</option>
                        <option value="09">September</option><option value="10">October</option>
                        <option value="11">November</option><option value="12">December</option>
                    </select>
                    <select id="birthday-day" class="text">
                        <option value="" disabled selected>Birth Day</option>
                    </select>
                </div>
                <!-- Hidden consolidated field for Mailchimp -->
                <input type="hidden" name="BIRTHDAY" id="mce-BIRTHDAY">
                
                <div id="mce-responses" class="clear foot">
                    <div class="response" id="mce-error-response" style="display: none;"></div>
                    <div class="response" id="mce-success-response" style="display: none;"></div>
                </div>
                
                <div aria-hidden="true" style="position: absolute; left: -5000px;">
                    <input type="text" name="b_37ca9b76709b0b1f54743c09b_f0396fbdf1" tabindex="-1" value="" id="mce-honeypot">
                </div>
                
                <button type="submit" name="subscribe" id="mc-embedded-subscribe" class="btn" text-config-key="SUBSCRIBE_BUTTON_TEXT">[SUBSCRIBE_BTN]</button>
                
                <div class="legal-compliance">
                    <input type="checkbox" id="legal-checkbox" required>
                    <label for="legal-checkbox" text-config-key="LEGAL_COMPLIANCE_TEXT">[LEGAL_TEXT]</label>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Message -->
    <div id="subscribe-success" style="display: none; padding: 40px 0;">
        <h2 class="section-title" text-config-key="SUBSCRIBE_SUCCESS_TITLE">Thank You!</h2>
        <p text-config-key="SUBSCRIBE_SUCCESS_TEXT">You've successfully subscribed to our style insights.</p>
    </div>
</div>
